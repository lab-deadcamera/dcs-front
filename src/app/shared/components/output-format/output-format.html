<section class="border-t border-ink-600 px-6 py-6">
  <ui-section-header
    number="03"
    labelKey="STUDIO.OUTPUT.TITLE"
    [collapsible]="true"
    [expanded]="expanded()"
    (toggle)="toggleExpanded()"
  />

  @if (expanded()) {
  <div class="mt-5 flex flex-col gap-5">
    <!-- Model selector -->
    <div class="flex flex-col gap-1">
      <label class="text-[11px] font-bold uppercase tracking-[0.18em] text-fg-strong">
        {{ 'STUDIO.OUTPUT.MODEL' | translate }}
      </label>
      <p-select
        [options]="modelOptions()"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'STUDIO.OUTPUT.MODEL_PLACEHOLDER' | translate"
        [(ngModel)]="modelValue"
        [loading]="modelsLoading()"
        [showClear]="true"
        data-testid="model-select"
        (onChange)="onModelChange($event.value)"
      />
    </div>

    <ui-toggle-group
      labelKey="STUDIO.OUTPUT.ASPECT_RATIO"
      variant="accent"
      [options]="aspectOptions"
      [value]="prompt.output().aspectRatio"
      (valueChange)="onAspect($event)"
    />

    <ui-toggle-group
      labelKey="STUDIO.OUTPUT.RESOLUTION"
      variant="accent"
      [options]="resolutionOptions"
      [value]="prompt.output().resolution === '1080p' ? null : prompt.output().resolution"
      (valueChange)="onResolution($event)"
    />
    <p class="-mt-3 text-[10px] italic text-fg-muted">
      {{ 'STUDIO.OUTPUT.HD_HINT' | translate }}
    </p>

    <div>
      <p class="mb-2 flex items-baseline gap-2 text-[11px] font-bold uppercase tracking-[0.18em] text-fg-strong">
        {{ 'STUDIO.OUTPUT.DURATION' | translate }}
        <span class="font-mono text-fg-muted">{{ prompt.output().durationSeconds }}s</span>
      </p>
      <ui-range-slider
        ariaLabelKey="STUDIO.OUTPUT.ARIA_DURATION"
        [min]="4"
        [max]="15"
        [step]="1"
        unit="s"
        [ticks]="[4, 8, 12, 15]"
        [value]="prompt.output().durationSeconds"
        (valueChange)="onDuration($event)"
      />
    </div>

    <div class="flex items-center justify-between">
      <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-fg-strong">
        {{ 'STUDIO.OUTPUT.SOUND' | translate }}
      </p>
      <ui-pill-toggle
        leftLabelKey="STUDIO.OUTPUT.OFF"
        rightLabelKey="STUDIO.OUTPUT.ON"
        accentSide="left"
        [value]="prompt.output().sound ? 'right' : 'left'"
        (valueChange)="onSound($event)"
      />
    </div>

    <div class="flex items-center justify-between">
      <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-fg-strong">
        {{ 'STUDIO.OUTPUT.ENGINE' | translate }}
      </p>
      <ui-pill-toggle
        leftLabelKey="STUDIO.OUTPUT.FAST"
        rightLabelKey="STUDIO.OUTPUT.PRO"
        accentSide="left"
        [value]="prompt.output().engine === 'fast' ? 'left' : 'right'"
        (valueChange)="onEngine($event)"
      />
    </div>
  </div>
  }
</section>
