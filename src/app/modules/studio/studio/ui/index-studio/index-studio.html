<div class="flex flex-col bg-ink-950 text-fg">
  <app-hero />

  <!--
    Layout follows the numbered workflow 01 → 06:
      LEFT (settings, lg+):
        01 Character & Assets
        02 Cinematography
        03 Output Format
      RIGHT (preview + critique + prompt, sticky on lg+):
        04 Viewer  +  Takes checklist (right rail)
        05 Rating
        06 Prompt Builder
        · Session Reel (history)

    · Mobile / tablet (< lg): single column, sections stacked 01 → 06.
    · Desktop (lg+): two columns at 50 / 50 — both `lg:flex-1`.
    · The right column sticks to the top of the viewport while the
      user scrolls the longer settings column.
    · Output Format (with the 1080p chip) lives in the LEFT column so
      it can't be misclicked while interacting with the viewer.
    · The takes checklist sits as a narrow right rail next to the viewer
      so the user can tick a take done without leaving the preview.
  -->
  <div class="flex flex-1 flex-col lg:flex-row lg:items-start">
    <!-- Steps 01 → 03 — Inputs (LEFT on lg+) -->
    <section class="flex flex-col lg:flex-1 lg:min-w-0">
      <app-character-assets />
      <app-cinematography />
      <app-output-format />
    </section>

    <!-- Steps 04 → 06 — Preview, Rating, Prompt (RIGHT on lg+, sticky) -->
    <aside
      class="flex flex-col lg:flex-1 lg:min-w-0 lg:border-l lg:border-ink-700 lg:sticky lg:top-0 lg:max-h-[calc(100dvh-4rem)] lg:overflow-y-auto"
    >
      <div class="flex items-start">
        <div class="min-w-0 flex-1">
          <app-viewer />
        </div>
        <app-take-checklist
          [takes]="studio.takes()"
          [currentIndex]="studio.currentTakeIndex()"
          [scenePrefix]="scenePrefix()"
          [locked]="!studio.isReady()"
          (toggle)="onToggleTake($event)"
        />
      </div>
      <app-rating />
      <app-prompt-builder
        (generate)="onGenerate()"
        [isRegenerating]="isRegenerating()"
        [takeSelected]="studio.isReady()"
      />
      <app-takes-reel
        [takes]="studio.activeTakes()"
        [discardedTakes]="studio.discardedTakes()"
        [selectedTakeIndex]="studio.currentTake()?.index ?? 1"
        (selectTake)="onSelectTake($event)"
        (toggleActive)="onToggleTakeActive($event.takeId, $event.takeIndex)"
      />
    </aside>
  </div>

  <app-footer />
</div>

<app-session-gate-dialog [visible]="gateOpen()" [adminClosable]="canBypassGate()" (visibleChange)="gateOpen.set($event)" />

<p-toast position="top-right" />
