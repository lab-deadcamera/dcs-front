<div class="flex flex-col bg-ink-950 text-fg">
  <app-hero />

  <!--
    Layout follows the numbered workflow 01 → 05:
      01 Cinematography  ┐
      02 Output Format   │  Settings column (LEFT on lg+)
      03 Character & Assets │
      04 Prompt Builder  ┘
      05 Viewer + Session Reel  (RIGHT on lg+, sticky preview)

    · Mobile / tablet (< lg): single column, sections stacked 01 → 05.
    · Desktop (lg+): two columns at 50 / 50 — both `lg:flex-1`. Below
      1024px the layout collapses to col so each column keeps a usable
      width.
    · The viewer column sticks to the top of the viewport while the
      user scrolls the longer settings column.
  -->
  <div class="flex flex-1 flex-col lg:flex-row lg:items-start">
    <!-- Steps 01 → 04 — Settings (LEFT on lg+) -->
    <section class="flex flex-col lg:flex-1 lg:min-w-0">
      <app-cinematography />
      <app-output-format />
      <app-character-assets />
      <app-prompt-builder />
    </section>

    <!-- Step 05 — Viewer (RIGHT on lg+, sticky preview) -->
    <aside
      class="flex flex-col lg:flex-1 lg:min-w-0 lg:border-l lg:border-ink-700 lg:sticky lg:top-0 lg:max-h-[calc(100dvh-4rem)] lg:overflow-y-auto"
    >
      <app-viewer />
      <app-session-reel />
    </aside>
  </div>

  <app-footer />

  <!-- Sticky generate action — always reachable -->
  <div
    class="sticky bottom-0 z-20 border-t border-ink-600 bg-ink-950/95 px-6 py-3 backdrop-blur-sm"
  >
    <button
      type="button"
      class="flex w-full items-center justify-center gap-3 bg-brand-red py-3 text-sm font-bold uppercase tracking-[0.28em] text-fg-strong transition-opacity hover:opacity-90 disabled:opacity-40"
      [disabled]="!prompt.canGenerate()"
      (click)="onGenerate()"
    >
      {{ 'STUDIO.PROMPT.GENERATE' | translate }}
      <span aria-hidden="true">→</span>
    </button>
  </div>
</div>
