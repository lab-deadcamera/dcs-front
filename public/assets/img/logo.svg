<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <!-- Outer rounded square -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="none" stroke="currentColor" stroke-width="6"/>
  <!-- Eye/shutter iris -->
  <g transform="translate(50, 50)">
    <!-- Outer iris ring -->
    <circle r="24" fill="none" stroke="currentColor" stroke-width="5"/>
    <!-- Shutter blades suggestion (top arc) -->
    <path d="M -18,-10 Q 0,-26 18,-10" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
    <!-- Pupil -->
    <circle r="8" fill="currentColor"/>
    <!-- Highlight -->
    <circle cx="-3" cy="-3" r="2.5" fill="#000"/>
  </g>
</svg>
